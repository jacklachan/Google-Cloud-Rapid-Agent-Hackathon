name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install runtime + test deps
        run: |
          python -m pip install --upgrade pip
          # Install only the deps tests actually need. The full requirements.txt
          # pulls in google-adk + GCP SDKs which are exercised in production but
          # mocked in the test suite.
          pip install \
            fastapi \
            'uvicorn[standard]' \
            'httpx>=0.27' \
            sse-starlette \
            pydantic \
            'opentelemetry-sdk>=1.25.0' \
            'opentelemetry-instrumentation-fastapi>=0.46b0' \
            'opentelemetry-instrumentation-httpx>=0.46b0' \
            pytest \
            pytest-asyncio

      - name: Run pytest
        env:
          FAULTLINE_FAKE_TELEMETRY: "1"
          FAULTLINE_FAKE_AGENT: "1"
        run: pytest tests/ -v
